<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox practice</title>
  </head>

  <body style="padding-bottom: 1000px;">
    <div style="
      display: flex;
      flex-direction: row;
      ">
      <div style="background-color: aquamarine;">div1 text</div>
      <div style="background-color: pink;">div2 <p>text</p></div>
    </div>

    <div style="
      display: flex;
      flex-direction: row;
      margin-top: 30px;">
      <div style="background-color: aquamarine;
      width: 100px;">100px</div>
      <div style="background-color: pink;
      flex: 1;
      ">flex :1</div>
    </div>

    <div style="
      display: flex;
      flex-direction: row;
      margin-top: 30px;">

        <div style="
        background-color: aquamarine;
        width: 100px;
        ">100px</div>

        <div style="
        background-color: pink;
        flex: 1;
        ">flex :1</div>

        <div style="
        background-color: aquamarine;
        flex: 2;
        ">flex: 2</div>
    </div>

    <div style="
      display: flex;
      flex-direction: row;
      margin-top: 30px;
      height: 70px;
      border-width: 1px;
      border-style: solid;
      border-color: grey;
      justify-content: center;">

      <div style="
      background-color: aquamarine;
      width: 100px;
      ">100px</div>

      <div style="
      background-color: pink;
      width: 100px;
      ">100px</div>

      <div style="
      background-color: aquamarine;
      width: 100px;
      ">100px</div>
    </div>

    <div style="
      display: flex;
      flex-direction: row;
      margin-top: 30px;
      height: 70px;
      border-width: 1px;
      border-style: solid;
      border-color: grey;
      justify-content: space-between;">

      <div style="
      background-color: aquamarine;
      width: 100px;
      ">100px</div>

      <div style="
      background-color: pink;
      width: 100px;
      ">100px</div>

      <div style="
      background-color: aquamarine;
      width: 100px;
      ">100px</div>
    </div>

    <div style="
      display: flex;
      flex-direction: row;
      margin-top: 30px;
      height: 70px;
      border-width: 1px;
      border-style: solid;
      border-color: grey;
      justify-content: space-between;
      align-items: center;">

      <div style="
      background-color: aquamarine;
      width: 100px;
      ">100px</div>

      <div style="
      background-color: pink;
      width: 100px;
      ">100px</div>

      <div style="
      background-color: aquamarine;
      width: 100px;
      ">100px</div>
    </div>
  </body>
</html>
